<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="3" fill="#1a1a1a"/>
  <clipPath id="r"><rect width="32" height="32" rx="3"/></clipPath>
  <g clip-path="url(#r)">
    <!-- Top-left: purple — slanted like the diagonal stroke of a "4" -->
    <path d="M0 0 h15 L2 18 H0 Z" fill="#9b59b6"/>
    <!-- Top-right: blue with wave hints -->
    <path d="M17 0 h15 v18 h-9 v-2 h-6 Z" fill="#3498db"/>
    <path d="M17 6 C21 4,27 8,32 6" stroke="#5ab0e8" stroke-width="1" fill="none" opacity="0.6"/>
    <path d="M17 11 C21 9,27 13,32 11" stroke="#5ab0e8" stroke-width="1" fill="none" opacity="0.6"/>
    <!-- Bottom-left: orange -->
    <path d="M0 18 h15 v14 H0 Z" fill="#e67e22"/>
    <!-- Bottom-right: green with grass hints -->
    <path d="M17 18 h15 v14 H17 Z" fill="#2ecc71"/>
    <line x1="20" y1="32" x2="19" y2="24" stroke="#45d98a" stroke-width="1" opacity="0.6"/>
    <line x1="24" y1="32" x2="25" y2="23" stroke="#45d98a" stroke-width="1" opacity="0.6"/>
    <line x1="28" y1="32" x2="27" y2="25" stroke="#45d98a" stroke-width="1" opacity="0.6"/>
    <!-- Thin border lines between regions -->
    <line x1="16" y1="0" x2="16" y2="32" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>
</svg>
