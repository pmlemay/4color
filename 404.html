<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // GitHub Pages SPA redirect: encodes the path into a query string
    // so index.html can restore it on load
    var path = window.location.pathname + window.location.search + window.location.hash;
    window.location.replace('/4color/?p=' + encodeURIComponent(path));
  </script>
</head>
<body></body>
</html>
